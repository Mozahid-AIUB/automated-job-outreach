name: Weekly Job Board Sync

on:
  schedule:
    - cron: '0 3 */4 * *'  # Every 4 days at 3AM UTC (9AM Bangladesh time)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create Google service account key file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > valued-context-460014-c1-f685e9c3ffa5.json

      - name: Run job sync
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY_FILE: valued-context-460014-c1-f685e9c3ffa5.json
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          JOB_SEARCH_QUERY: ${{ secrets.JOB_SEARCH_QUERY }}
          JOB_SEARCH_LOCATION: ${{ secrets.JOB_SEARCH_LOCATION }}
          JOB_FETCH_LIMIT: ${{ secrets.JOB_FETCH_LIMIT }}
          JOB_BOARD_SHEET_NAME: Job Board
        run: node sync-jobs.js
